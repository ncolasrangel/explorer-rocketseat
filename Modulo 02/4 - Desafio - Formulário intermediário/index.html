<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentoria</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Staatliches&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <header>
            <h1>Mentoria</h1>
            <p>Preencha o formulário abaixo para agendar a sua mentoria</p>
        </header>

        <form action="#">
            <fieldset>
                <legend>Informações pessoais</legend>

                <div class="column-name">

                    <div class="input-wrapper">
                        <label for="event-name">Nome</label>
                        <input type="text" id="event-name">
                    </div>
    
                    <div class="input-wrapper">
                        <label for="event-last-name">sobrenome</label>
                        <input type="text" id="event-last-name">
                    </div>

                </div>

                <div class="input-wrapper">
                    <label for="event-email">E-mail<span>(digite um email válido)</span></label>
                    <input type="email" id="event-email">
                </div>

                <div class="input-wrapper"> <!--numero minimo de caracteres (FAZER)-->
                    <label for="event-password">Senha<span>(mínimo de 6 caracteres)</span></label>
                    <input type="password" id="event-password">
                </div>
            </fieldset>

            <fieldset>
                <legend class="space">Informações do mentor</legend>

                <div class="input-wrapper">
                    <label for="event-name-mentor">Nome do seu mentor<span>(só o primeiro nome)</span></label>
                    <input type="text" id="event-name-mentor">
                </div>
            </fieldset>

            <fieldset>
                <legend class="space">Seus horários disponíveis</legend>

                <h2>Primeira mentoria</h2>
                <div class="column-date">

                    <div class="input-wrapper">
                        <label for="event-date">Data<span>(DD/MM/AAAA)</span></label>
                        <input type="date" id="event-date">
                    </div>

                    <div class="input-wrapper">
                        <label for="event-start-date">Das</label>
                        <input type="date" id="event-start-date">
                    </div>

                    <div class="input-wrapper">
                        <label for="event-end-date">Até</label>
                        <input type="date" id="event-end-date">
                    </div>
                </div>

                <h2>Segunda mentoria</h2>
                <div class="column-date">

                    <div class="input-wrapper">
                        <label for="event-last-date">Data<span>(DD/MM/AAAA)</span></label>
                        <input type="date" id="event-last-date">
                    </div>

                    <div class="input-wrapper">
                        <label for="event-last-start-date">Das</label>
                        <input type="date" id="event-last-start-date">
                    </div>

                    <div class="input-wrapper">
                        <label for="event-last-end-date">Até</label>
                        <input type="date" id="event-last-end-date">
                    </div>
                </div>
            </fieldset>
        </form>

        <footer>
            <button>Salvar</button>
        </footer>
    </div>
</body>
</html>
